<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Eloquence — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <nav>
    <div class="logo">🎤 My Eloquence</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="diagnostic.html">Diagnostic</a>
      <a href="learn.html">Learn</a>
      <a href="exercise.html">Practice</a>
      <a href="history.html" class="active">History</a>
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="badge">📋 Your Journey</div>
    <h1>Practice <span class="highlight">History</span></h1>
    <p class="subtitle">All your past sessions in one place. Track your growth over time.</p>
  </div>

  <div id="historyContainer"></div>
</div>

<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
    const btn = document.getElementById('darkToggle');
    btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('dark', document.body.classList.contains('dark'));
  }
  if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkToggle').textContent = '☀️';
  }

  const particleContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
    p.style.opacity = 0.15 + Math.random() * 0.25;
    particleContainer.appendChild(p);
  }
</script>

<script type="module">
  import { getUser, getSessions } from './auth.js';

  const historyContainer = document.getElementById('historyContainer');
  historyContainer.innerHTML = '<div class="card" style="text-align:center;padding:40px;"><p style="font-weight:700;color:var(--text-muted);">⏳ Loading your history...</p></div>';

  try {
    const user = await getUser();

    if (!user) {
      historyContainer.innerHTML = `
        <div class="card" style="text-align:center;padding:60px 20px;">
          <div style="font-size:3rem;margin-bottom:16px;">🔐</div>
          <p style="font-size:1rem;font-weight:600;color:var(--text-muted);margin-bottom:20px;">Login to see your practice history</p>
        </div>`;
    } else {
      const sessions = await getSessions();

      if (!sessions || sessions.length === 0) {
        historyContainer.innerHTML = `
          <div class="card" style="text-align:center;padding:60px 20px;">
            <div style="font-size:3rem;margin-bottom:16px;">🎙️</div>
            <p style="font-size:1rem;font-weight:600;color:var(--text-muted);margin-bottom:20px;">No practice sessions yet!</p>
            <a href="exercise.html"><button class="btn-primary">Start Practicing</button></a>
          </div>`;
      } else {
        historyContainer.innerHTML = '';
        sessions.forEach(s => {
          const date = new Date(s.created_at).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          const card = document.createElement('div');
          card.className = 'card';
          card.style.marginTop = '16px';
          card.innerHTML = `
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
              <span style="background:rgba(255,75,110,0.08);padding:4px 12px;border-radius:99px;font-size:0.75rem;font-weight:700;color:var(--primary);">📅 ${date}</span>
              <span style="background:rgba(255,75,110,0.08);padding:4px 12px;border-radius:99px;font-size:0.75rem;font-weight:700;color:var(--primary);">⏱ ${s.duration || '00:00'}</span>
              <span style="background:rgba(255,75,110,0.08);padding:4px 12px;border-radius:99px;font-size:0.75rem;font-weight:700;color:var(--primary);">⚠️ ${s.filler_count || 0} fillers</span>
            </div>
            <div style="font-size:0.75rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">📝 Your Speech</div>
            <div style="font-size:0.92rem;color:var(--text-muted);line-height:1.7;white-space:pre-wrap;margin-bottom:14px;">${s.transcript || 'No transcript'}</div>
            <div style="font-size:0.75rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🧠 AI Feedback</div>
            <div style="font-size:0.92rem;color:var(--text-muted);line-height:1.7;white-space:pre-wrap;">${s.feedback || 'No feedback'}</div>
          `;
          historyContainer.appendChild(card);
        });
      }
    }
  } catch(err) {
    console.error('History error:', err);
    historyContainer.innerHTML = '<div class="card" style="text-align:center;padding:40px;"><p style="color:#ef4444;font-weight:700;">⚠️ Error loading history. Please refresh.</p></div>';
  }
</script>

<script type="module" src="login-widget.js"></script>
</body>
</html>
