<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Eloquence — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .session-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-top: 16px;
      animation: fadeUp 0.5s ease both;
      transition: all 0.2s ease;
    }
    .session-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,75,110,0.1); }
    .session-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .session-tag {
      font-size: 0.75rem; font-weight: 700;
      padding: 4px 12px; border-radius: 99px;
      background: rgba(255,75,110,0.08);
      color: var(--primary);
      border: 1px solid rgba(255,75,110,0.15);
    }
    body.dark .session-tag { background: rgba(124,131,255,0.1); color: #7c83ff; border-color: rgba(124,131,255,0.2); }
    .session-label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .session-text { font-size: 0.92rem; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state div { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1rem; font-weight: 600; }
    .login-prompt { text-align: center; padding: 60px 20px; }
    .login-prompt div { font-size: 3rem; margin-bottom: 16px; }
    .login-prompt p { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 20px; }
    body.dark .session-card { background: #1a1a1a; }
  </style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="container">

  <nav>
    <div class="logo">🎤 My Eloquence</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="diagnostic.html">Diagnostic</a>
      <a href="learn.html">Learn</a>
      <a href="exercise.html">Practice</a>
      <a href="history.html" class="active">History</a>
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="badge">📋 Your Journey</div>
    <h1>Practice <span class="highlight">History</span></h1>
    <p class="subtitle">All your past sessions in one place. Track your growth over time.</p>
  </div>

  <div id="loginPrompt" class="card login-prompt" style="display:none;">
    <div>🔐</div>
    <p>Login to see your practice history</p>
    <button class="btn-primary" id="loginBtn">Login with Google</button>
  </div>

  <div id="historyContainer"></div>

</div>

<script type="module">
  import { getUser, getSessions, updateNav, signInWithGoogle } from './auth.js'

  // Dark mode
 window.toggleDark = function() {
    document.body.classList.toggle('dark')
    const btn = document.getElementById('darkToggle')
    btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'
    localStorage.setItem('dark', document.body.classList.contains('dark'))
  }
 
  if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark')
    document.getElementById('darkToggle').textContent = '☀️'
  }

  // Particles
  const container = document.getElementById('particles')
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div')
    p.className = 'particle'
    p.style.left = Math.random() * 100 + 'vw'
    p.style.animationDelay = Math.random() * 8 + 's'
    p.style.animationDuration = (6 + Math.random() * 8) + 's'
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px'
    p.style.opacity = 0.15 + Math.random() * 0.25
    container.appendChild(p)
  }

  await updateNav()
  const user = await getUser()

  if (!user) {
    document.getElementById('loginPrompt').style.display = 'block'
    document.getElementById('loginBtn').onclick = signInWithGoogle
    return
  }

  const sessions = await getSessions()
  const histContainer = document.getElementById('historyContainer')

  if (sessions.length === 0) {
    histContainer.innerHTML = `
      <div class="card empty-state">
        <div>🎙️</div>
        <p>No practice sessions yet! Go record your first speech.</p>
        <a href="exercise.html" style="display:inline-block;margin-top:20px;">
          <button class="btn-primary">Start Practicing</button>
        </a>
      </div>
    `
    return
  }

  sessions.forEach(s => {
    const date = new Date(s.created_at).toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    })

    const card = document.createElement('div')
    card.className = 'session-card'
    card.innerHTML = `
      <div class="session-meta">
        <span class="session-tag">📅 ${date}</span>
        <span class="session-tag">⏱ ${s.duration || '00:00'}</span>
        <span class="session-tag">⚠️ ${s.filler_count || 0} fillers</span>
      </div>
      <div class="session-label">📝 Your Speech</div>
      <div class="session-text">${s.transcript || 'No transcript'}</div>
      <div class="session-label" style="margin-top:14px;">🧠 AI Feedback</div>
      <div class="session-text">${s.feedback || 'No feedback'}</div>
    `
    histContainer.appendChild(card)
  })
</script>
<script type="module" src="login-widget.js"></script>
</body>
</html>
