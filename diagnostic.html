<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Eloquence — Diagnostic Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-wrap { animation: fadeUp 0.6s ease both; }
    .progress-bar-bg { background: rgba(255,75,110,0.12); border-radius: 99px; height: 8px; margin-bottom: 28px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 99px; transition: width 0.4s ease; }
    .q-number { font-size: 0.8rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-category { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 3px 12px; border-radius: 99px; margin-bottom: 14px; }
    .cat-grammar { background: rgba(99,102,241,0.12); color: #6366f1; }
    .cat-vocabulary { background: rgba(34,211,238,0.12); color: #0891b2; }
    .cat-pronunciation { background: rgba(251,146,60,0.15); color: #ea580c; }
    .cat-comprehension { background: rgba(34,197,94,0.12); color: #16a34a; }
    .q-text { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 22px; line-height: 1.6; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { background: rgba(255,255,255,0.7); border: 2px solid var(--border); border-radius: 14px; padding: 14px 18px; font-family: 'Outfit', sans-serif; font-size: 0.97rem; font-weight: 600; color: var(--text); cursor: pointer; text-align: left; transition: all 0.2s ease; }
    .option:hover { border-color: var(--primary); background: rgba(255,75,110,0.06); transform: translateX(4px); }
    .option.correct { border-color: #22c55e; background: rgba(34,197,94,0.1); color: #15803d; }
    .option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.1); color: #dc2626; }
    .option.disabled { pointer-events: none; }
    .next-btn { display: none; margin-top: 20px; width: 100%; justify-content: center; }
    .result-wrap { text-align: center; animation: fadeUp 0.7s ease both; }
    .score-circle { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 12px 40px rgba(255,75,110,0.3); }
    .score-num { font-family: 'Outfit', sans-serif; font-size: 2.8rem; font-weight: 800; color: white; line-height: 1; }
    .score-label { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.8); }
    .level-badge { display: inline-block; font-size: 1.1rem; font-weight: 800; padding: 10px 28px; border-radius: 99px; margin-bottom: 20px; }
    .level-beginner { background: rgba(239,68,68,0.12); color: #dc2626; border: 2px solid rgba(239,68,68,0.25); }
    .level-intermediate { background: rgba(251,146,60,0.12); color: #ea580c; border: 2px solid rgba(251,146,60,0.25); }
    .level-advanced { background: rgba(34,197,94,0.12); color: #16a34a; border: 2px solid rgba(34,197,94,0.25); }
    .result-msg { font-size: 1rem; color: var(--text-muted); line-height: 1.7; max-width: 420px; margin: 0 auto 28px; }
    .section-scores { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 24px 0; text-align: left; }
    .section-score-item { background: rgba(255,255,255,0.7); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .section-score-item .s-label { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 6px; }
    .section-score-item .s-val { font-size: 1.3rem; font-weight: 900; color: var(--primary); }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    .set-badge { font-size: 0.75rem; color: var(--text-muted); text-align: right; margin-bottom: 8px; font-weight: 600; }
    body.dark .option { background: rgba(22,22,31,0.8); color: #f0f0ff; border-color: rgba(124,131,255,0.2); }
    body.dark .option:hover { background: rgba(124,131,255,0.1); }
    body.dark .option.correct { background: rgba(34,197,94,0.15); color: #4ade80; }
    body.dark .option.wrong { background: rgba(239,68,68,0.15); color: #f87171; }
    body.dark .q-text { color: #f0f0ff; }
    body.dark .section-score-item { background: rgba(22,22,31,0.8); border-color: rgba(124,131,255,0.2); }
    body.dark .result-msg { color: #7070a0; }
    body.dark .progress-bar-bg { background: rgba(124,131,255,0.15); }
    @media (max-width: 600px) {
      .section-scores { grid-template-columns: 1fr; }
      .score-circle { width: 120px; height: 120px; }
      .score-num { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <nav>
    <div class="logo">🎤 My Eloquence</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="diagnostic.html" class="active">Diagnostic</a>
      <a href="learn.html">Learn</a>
      <a href="exercise.html">Practice</a>
      <a href="history.html">History</a>
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="badge">📋 Skill Diagnostic</div>
    <h1>Know Your <span class="highlight">Level</span></h1>
    <p class="subtitle">25 questions covering comprehension, grammar, pronunciation, and vocabulary.</p>
  </div>

  <div class="card quiz-wrap" id="quizCard">
    <div class="set-badge" id="setBadge"></div>
    <div class="q-number" id="qNumber">Question 1 of 25</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:4%"></div>
    </div>
    <div class="q-category" id="qCategory"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <button class="btn-primary next-btn" id="nextBtn" onclick="nextQuestion()">
      Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <div class="card result-wrap" id="resultCard" style="display:none;">
    <div class="score-circle">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-label">out of 25</div>
    </div>
    <div class="level-badge" id="levelBadge"></div>
    <p class="result-msg" id="resultMsg"></p>
    <div class="section-scores">
      <div class="section-score-item">
        <div class="s-label">📖 Comprehension</div>
        <div class="s-val" id="sComprehension">0/5</div>
      </div>
      <div class="section-score-item">
        <div class="s-label">🔤 Grammar</div>
        <div class="s-val" id="sGrammar">0/10</div>
      </div>
      <div class="section-score-item">
        <div class="s-label">🗣️ Pronunciation</div>
        <div class="s-val" id="sPronunciation">0/5</div>
      </div>
      <div class="section-score-item">
        <div class="s-label">📚 Vocabulary</div>
        <div class="s-val" id="sVocabulary">0/5</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="location.reload()">🔄 Try Other Set</button>
      <a href="exercise.html"><button class="btn-primary">🎤 Start Practicing</button></a>
    </div>
  </div>
</div>

<script>
// ===== QUESTION SET 1 =====
const set1 = [
  { category: "Comprehension", question: "Read: 'The speaker paused dramatically before revealing the answer.' What effect does the pause create?", options: ["It shows the speaker forgot the answer", "It builds suspense and emphasizes the reveal", "It indicates nervousness", "It gives the audience time to leave"], answer: 1 },
  { category: "Comprehension", question: "Read: 'Her monotone delivery put the audience to sleep despite her brilliant content.' What is the main issue?", options: ["The content was poor", "The delivery lacked vocal variety", "She spoke too fast", "She used too many filler words"], answer: 1 },
  { category: "Comprehension", question: "Read: 'He used anaphora — repeating I have a dream — to build emotional momentum.' What is anaphora?", options: ["A type of pause", "Repetition of a phrase at the start of successive sentences", "A breathing technique", "A question and answer technique"], answer: 1 },
  { category: "Comprehension", question: "Read: 'The debater used logos — citing statistics and peer-reviewed research — to support her claim.' What is logos?", options: ["Emotional appeal", "Appeal through logic and evidence", "Speaker credibility", "Use of metaphors"], answer: 1 },
  { category: "Comprehension", question: "Read: 'Despite his strong vocabulary, his mispronunciation of key terms undermined his credibility.' What is the main takeaway?", options: ["Vocabulary is not important", "Pronunciation affects how credible a speaker sounds", "Key terms should be avoided", "Credibility depends only on content"], answer: 1 },
  { category: "Grammar", question: "Choose the correct sentence:", options: ["Neither of the students have submitted their work.", "Neither of the students has submitted their work.", "Neither of the students has submitted his work.", "Neither of the student has submitted their work."], answer: 1 },
  { category: "Grammar", question: "Which sentence uses the subjunctive mood correctly?", options: ["I wish I was taller.", "I wish I were taller.", "I wish I am taller.", "I wish I be taller."], answer: 1 },
  { category: "Grammar", question: "Identify the correct passive voice:", options: ["The report was wrote by the manager.", "The report was written by the manager.", "The report were written by the manager.", "The report has wrote by the manager."], answer: 1 },
  { category: "Grammar", question: "Which is the correct third conditional?", options: ["If I studied, I would pass.", "If I had studied, I would have passed.", "If I would study, I will pass.", "If I study, I would have passed."], answer: 1 },
  { category: "Grammar", question: "Choose the correct article usage:", options: ["She is best student in class.", "She is the best student in the class.", "She is a best student in class.", "She is best student in the class."], answer: 1 },
  { category: "Grammar", question: "Which sentence has correct subject-verb agreement?", options: ["The team are playing well.", "The team is playing well.", "The teams is playing well.", "The team were playing good."], answer: 1 },
  { category: "Grammar", question: "Identify the dangling modifier:", options: ["Running quickly, the bus was missed.", "Running quickly, she missed the bus.", "She missed the bus running quickly.", "The bus was missed because she ran."], answer: 0 },
  { category: "Grammar", question: "Choose the correct tense: 'By the time she arrived, they ___ for two hours.'", options: ["waited", "were waiting", "had been waiting", "have been waiting"], answer: 2 },
  { category: "Grammar", question: "Which uses the gerund correctly?", options: ["She avoided to speak in public.", "She avoided speaking in public.", "She avoided speak in public.", "She avoided spoken in public."], answer: 1 },
  { category: "Grammar", question: "Identify the correct comparative form:", options: ["This speech is more better than the last.", "This speech is better than the last.", "This speech is more good than the last.", "This speech is gooder than the last."], answer: 1 },
  { category: "Pronunciation", question: "Which word has a silent 'b'?", options: ["bomb", "born", "bent", "bind"], answer: 0 },
  { category: "Pronunciation", question: "How is 'cache' correctly pronounced?", options: ["ka-SHAY", "CATCH", "CASH", "KAY-she"], answer: 2 },
  { category: "Pronunciation", question: "Which word is stressed on the SECOND syllable?", options: ["PREsent (noun)", "beGIN", "TAble", "OPen"], answer: 1 },
  { category: "Pronunciation", question: "The word 'colonel' is pronounced as:", options: ["col-O-nel", "KER-nel", "COL-nel", "col-o-NEL"], answer: 1 },
  { category: "Pronunciation", question: "In which word does 'gh' make an 'f' sound?", options: ["though", "through", "tough", "thought"], answer: 2 },
  { category: "Vocabulary", question: "What does 'loquacious' mean?", options: ["Silent and reserved", "Extremely talkative", "Well-organized", "Highly intelligent"], answer: 1 },
  { category: "Vocabulary", question: "Choose the correct word: 'His speech was ___; it inspired everyone in the room.'", options: ["mundane", "banal", "galvanizing", "tedious"], answer: 2 },
  { category: "Vocabulary", question: "What is the meaning of 'verbose'?", options: ["Using too many words", "Speaking very quietly", "Being direct and concise", "Having a strong accent"], answer: 0 },
  { category: "Vocabulary", question: "Which word means 'to speak in a hesitant, unclear way'?", options: ["articulate", "enunciate", "mumble", "project"], answer: 2 },
  { category: "Vocabulary", question: "What does 'extemporaneous' mean in the context of speaking?", options: ["Extremely long", "Spoken without preparation", "Very emotional", "Using complex vocabulary"], answer: 1 }
];

// ===== QUESTION SET 2 =====
const set2 = [
  { category: "Comprehension", question: "Read: 'The politician used pathos — sharing a personal story of loss — to connect with voters.' What is pathos?", options: ["Logical argument", "Use of statistics", "Emotional appeal", "Speaker's credibility"], answer: 2 },
  { category: "Comprehension", question: "Read: 'Her ethos was established through her 20 years of medical experience before she spoke.' What is ethos?", options: ["Emotional connection", "Logical reasoning", "Credibility and trustworthiness", "Use of examples"], answer: 2 },
  { category: "Comprehension", question: "Read: 'He signposted his speech clearly: firstly, secondly, and finally — the audience always knew where he was.' What is signposting?", options: ["Using visual aids", "Guiding the audience through the speech structure", "Repeating key points", "Asking questions"], answer: 1 },
  { category: "Comprehension", question: "Read: 'The speaker's upspeak — ending statements with a rising pitch — made her sound uncertain even about facts she knew well.' What is upspeak?", options: ["Speaking too loudly", "Ending statements with a question-like rising pitch", "Speaking too fast", "Using filler words"], answer: 1 },
  { category: "Comprehension", question: "Read: 'His vocal variety — varying pace, pitch, and volume — kept the 500-person audience engaged for 45 minutes.' What mainly kept them engaged?", options: ["The length of the speech", "The size of the audience", "Variation in how he delivered the speech", "The topic itself"], answer: 2 },
  { category: "Grammar", question: "Which sentence is grammatically correct?", options: ["Between you and I, this is wrong.", "Between you and me, this is wrong.", "Between you and myself, this is wrong.", "Between I and you, this is wrong."], answer: 1 },
  { category: "Grammar", question: "Choose the correct form: 'She ___ here since 2018.'", options: ["works", "worked", "has been working", "is working"], answer: 2 },
  { category: "Grammar", question: "Which is a split infinitive?", options: ["To speak clearly is important.", "She wanted to quickly speak.", "She spoke clearly and confidently.", "To be or not to be."], answer: 1 },
  { category: "Grammar", question: "Choose the correct relative pronoun: 'The speaker ___ won the award was outstanding.'", options: ["which", "whom", "who", "whose"], answer: 2 },
  { category: "Grammar", question: "Identify the correct use of 'fewer' vs 'less':", options: ["There are less people today.", "There are fewer people today.", "There is fewer people today.", "There are less persons today."], answer: 1 },
  { category: "Grammar", question: "Which sentence uses reported speech correctly?", options: ["She said she is happy.", "She said that she was happy.", "She said that she is happy.", "She told she was happy."], answer: 1 },
  { category: "Grammar", question: "Choose the correct modal verb: 'You ___ have told me earlier — now it's too late.'", options: ["should", "shall", "will", "can"], answer: 0 },
  { category: "Grammar", question: "Which sentence has a misplaced modifier?", options: ["She almost drove her children to school every day.", "She drove her children to school almost every day.", "Almost every day she drove her children to school.", "She drove almost every day to school."], answer: 0 },
  { category: "Grammar", question: "Choose the correct preposition: 'He is good ___ public speaking.'", options: ["in", "on", "at", "for"], answer: 2 },
  { category: "Grammar", question: "Which sentence uses the correct form of the verb?", options: ["The data shows a clear trend.", "The data show a clear trend.", "Both are acceptable.", "Neither is correct."], answer: 2 },
  { category: "Pronunciation", question: "How many syllables does 'particularly' have?", options: ["4", "5", "6", "3"], answer: 1 },
  { category: "Pronunciation", question: "Which word has a silent 'k'?", options: ["kite", "knock", "king", "keep"], answer: 1 },
  { category: "Pronunciation", question: "The word 'quinoa' is correctly pronounced as:", options: ["KWIN-o-a", "KEEN-wah", "kwi-NO-ah", "KEE-no-ah"], answer: 1 },
  { category: "Pronunciation", question: "Which word is stressed on the FIRST syllable when used as a noun?", options: ["reCORD", "PREsent", "conTENT", "perMIT"], answer: 1 },
  { category: "Pronunciation", question: "The 'th' in 'this' is:", options: ["Unvoiced", "Voiced", "Silent", "Aspirated"], answer: 1 },
  { category: "Vocabulary", question: "What does 'circumlocution' mean?", options: ["Speaking directly and concisely", "Using many words to say something that could be said briefly", "A type of vocal exercise", "The study of speech sounds"], answer: 1 },
  { category: "Vocabulary", question: "Choose the word that means 'able to speak fluently and coherently':", options: ["inarticulate", "taciturn", "articulate", "reticent"], answer: 2 },
  { category: "Vocabulary", question: "What does 'rhetoric' mean?", options: ["Empty, meaningless talk", "The art of effective speaking or writing", "A type of question with no answer", "Stage fright"], answer: 1 },
  { category: "Vocabulary", question: "Which word means 'a long, pompous speech'?", options: ["soliloquy", "harangue", "anecdote", "monologue"], answer: 1 },
  { category: "Vocabulary", question: "What does 'prolific' mean?", options: ["Extremely brief", "Producing a large amount of work", "Unable to speak clearly", "Speaking in multiple languages"], answer: 1 }
];

// ===== QUIZ LOGIC =====
const questionSets = [set1, set2];
const setIndex = parseInt(sessionStorage.getItem('diagSetIndex') || '0');
const nextIndex = (setIndex + 1) % 2;
sessionStorage.setItem('diagSetIndex', nextIndex);

const questions = questionSets[setIndex];
let current = 0, score = 0;
let sectionScores = { Comprehension: 0, Grammar: 0, Pronunciation: 0, Vocabulary: 0 };

document.getElementById('setBadge').textContent = `Set ${setIndex + 1} of 2`;

function getCatClass(category) {
  const map = { "Grammar": "cat-grammar", "Vocabulary": "cat-vocabulary", "Pronunciation": "cat-pronunciation", "Comprehension": "cat-comprehension" };
  return map[category] || "cat-grammar";
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById('qNumber').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / questions.length) * 100}%`;
  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('qCategory').className = `q-category ${getCatClass(q.category)}`;
  document.getElementById('qText').textContent = q.question;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });
  document.getElementById('nextBtn').style.display = 'none';
}

function selectAnswer(index, btn) {
  const q = questions[current];
  document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
  if (index === q.answer) {
    btn.classList.add('correct'); score++;
    if (sectionScores[q.category] !== undefined) sectionScores[q.category]++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.option')[q.answer].classList.add('correct');
  }
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'flex';
  nextBtn.textContent = current === questions.length - 1 ? '🏁 See Results' : 'Next →';
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
  else showResults();
}

function showResults() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('scoreNum').textContent = score;
  let level, msg, badgeClass;
  if (score <= 10) { level = "Beginner"; badgeClass = "level-beginner"; msg = "Keep practicing! Focus on grammar fundamentals and build your vocabulary daily."; }
  else if (score <= 18) { level = "Intermediate"; badgeClass = "level-intermediate"; msg = "Solid performance! Push further with advanced grammar and pronunciation precision."; }
  else { level = "Advanced"; badgeClass = "level-advanced"; msg = "Outstanding! Focus on mastering nuance, tone, and delivery."; }
  const badge = document.getElementById('levelBadge');
  badge.textContent = `🏅 ${level}`;
  badge.className = `level-badge ${badgeClass}`;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('sComprehension').textContent = `${sectionScores['Comprehension']}/5`;
  document.getElementById('sGrammar').textContent = `${sectionScores['Grammar']}/10`;
  document.getElementById('sPronunciation').textContent = `${sectionScores['Pronunciation']}/5`;
  document.getElementById('sVocabulary').textContent = `${sectionScores['Vocabulary']}/5`;
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('darkToggle');
  btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
  localStorage.setItem('dark', document.body.classList.contains('dark'));
}
if (localStorage.getItem('dark') === 'true') {
  document.body.classList.add('dark');
  document.getElementById('darkToggle').textContent = '☀️';
}

const particleContainer = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (6 + Math.random() * 8) + 's';
  p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
  p.style.opacity = 0.15 + Math.random() * 0.25;
  particleContainer.appendChild(p);
}

loadQuestion();
</script>
<script type="module" src="login-widget.js"></script>
</body>
</html>
