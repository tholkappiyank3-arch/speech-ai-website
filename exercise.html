<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Eloquence — Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="container">
  <nav>
    <div class="logo">🎤 My Eloquence</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="diagnostic.html">Diagnostic</a>
      <a href="learn.html">Learn</a>
      <a href="exercise.html" class="active">Practice</a>
      <a href="history.html">History</a>
      <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="badge">🎙️ Live Session</div>
    <h1>Practice Your <span class="highlight">Speech</span></h1>
    <p class="subtitle">Hit record, speak your mind, and let AI coach you.</p>
  </div>

  <div class="card topic-card">
    <div class="card-label">💡 Topic Prompt</div>
    <div id="topicText" class="topic-text">Click below to get a random topic!</div>
    <button class="btn-secondary" onclick="newTopic()" style="margin-top:14px;">🔀 New Topic</button>
  </div>

  <div class="card record-card">
    <div class="timer-display" id="timerDisplay">⏱ 00:00</div>
    <div class="record-status" id="recordStatus">Ready to record</div>
    <div class="btn-row">
      <button id="startBtn" class="btn-primary"><span>▶ Start Recording</span></button>
      <button id="stopBtn" class="btn-stop" style="display:none;"><span>⏹ Stop</span></button>
    </div>
  </div>

  <div id="fillerResult" class="filler-box" style="display:none;"></div>

  <div class="card">
    <div class="card-label">📝 Your Speech</div>
    <div id="transcript" class="box"></div>
  </div>

  <div class="card">
    <div class="card-label">🧠 AI Feedback</div>
    <div id="feedback" class="box"></div>
  </div>
</div>

<script>
  // Dark mode — must be plain script, not module
  function toggleDark() {
    document.body.classList.toggle('dark');
    const btn = document.getElementById('darkToggle');
    btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('dark', document.body.classList.contains('dark'));
  }
  if (localStorage.getItem('dark') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkToggle').textContent = '☀️';
  }

  // Particles
  const particleContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
    p.style.opacity = 0.15 + Math.random() * 0.25;
    particleContainer.appendChild(p);
  }

  // Topic prompts
  const topics = [
    "Describe your biggest achievement in 2 minutes.",
    "Talk about a person who inspired you the most.",
    "What would you do if you were president for a day?",
    "Describe your dream job and why you want it.",
    "Talk about a challenge you overcame recently.",
    "What is the most important skill for success?",
    "Describe a place you would love to visit and why.",
    "What does success mean to you?",
    "Talk about a book or movie that changed your perspective.",
    "Why is public speaking important in daily life?",
    "Describe your perfect day from morning to night.",
    "What advice would you give your younger self?",
    "Talk about a hobby you are passionate about.",
    "What is the biggest problem in the world today?",
    "Describe a time you had to make a difficult decision."
  ];

  function newTopic() {
    const t = topics[Math.floor(Math.random() * topics.length)];
    document.getElementById('topicText').textContent = t;
  }
  newTopic();

  // Recording logic
  const transcriptDiv = document.getElementById("transcript");
  const feedbackDiv = document.getElementById("feedback");
  const BACKEND_URL = "https://speech-ai-website-1.onrender.com";

  let recognition;
  try {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
  } catch(e) {
    console.error('Speech recognition not supported');
  }

  let finalText = "";
  let timerInterval = null;
  let seconds = 0;
  let fillerCount = 0;

  window.addEventListener("beforeunload", () => window.speechSynthesis.cancel());
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) window.speechSynthesis.cancel();
  });

  if (recognition) {
    recognition.onresult = function(event) {
      finalText = "";
      for (let i = 0; i < event.results.length; i++) {
        finalText += event.results[i][0].transcript;
      }
      transcriptDiv.innerText = finalText;
    };
  }

  function updateTimer() {
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById("timerDisplay").innerText = `⏱ ${m}:${s}`;
  }

  function showFillerCount(text) {
    const fillers = ["um", "uh", "like", "you know", "basically", "literally", "actually", "so", "right"];
    const lower = text.toLowerCase();
    let total = 0;
    let breakdown = [];
    fillers.forEach(f => {
      const regex = new RegExp(`\\b${f}\\b`, 'gi');
      const matches = lower.match(regex);
      if (matches && matches.length > 0) {
        total += matches.length;
        breakdown.push(`"${f}" × ${matches.length}`);
      }
    });
    const box = document.getElementById("fillerResult");
    box.style.display = "block";
    if (total === 0) {
      box.innerHTML = `✅ <strong>No filler words detected!</strong> Great job!`;
      box.style.background = "rgba(34,197,94,0.1)";
      box.style.borderColor = "#22c55e";
      box.style.color = "#15803d";
    } else {
      box.innerHTML = `⚠️ <strong>${total} filler word(s) detected:</strong> ${breakdown.join(", ")}`;
      box.style.background = "rgba(239,68,68,0.08)";
      box.style.borderColor = "#ef4444";
      box.style.color = "#dc2626";
    }
    return total;
  }

  function speakFeedback(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    speech.pitch = 1.1;
    speech.rate = 0.95;
    speech.volume = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
  }

  async function getAIFeedback(text) {
    if (!text || text.trim() === "") {
      feedbackDiv.innerText = "No speech detected.";
      return;
    }
    feedbackDiv.innerText = "Analyzing with AI...";
    try {
      const response = await fetch(`${BACKEND_URL}/ai`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await response.json();
      feedbackDiv.innerText = data.reply;
      speakFeedback(data.reply);

      // Save to Supabase if logged in
      try {
        const { saveSession } = await import('./auth.js');
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        await saveSession(text, data.reply, `${m}:${s}`, fillerCount);
      } catch(e) {
        console.log('Could not save session:', e);
      }

    } catch (error) {
      feedbackDiv.innerText = "Backend not reachable. Is the server running?";
      console.error(error);
    }
  }

  document.getElementById("startBtn").onclick = () => {
    finalText = "";
    transcriptDiv.innerText = "";
    feedbackDiv.innerText = "";
    document.getElementById("fillerResult").style.display = "none";
    seconds = 0;
    fillerCount = 0;
    updateTimer();
    timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
    document.getElementById('recordStatus').textContent = '🔴 Recording...';
    document.getElementById('recordStatus').style.color = '#ef4444';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    document.getElementById('startBtn').style.display = 'none';
    if (recognition) recognition.start();
  };

  document.getElementById("stopBtn").onclick = () => {
    if (recognition) recognition.stop();
    clearInterval(timerInterval);
    document.getElementById('recordStatus').textContent = '⏳ Analyzing...';
    document.getElementById('recordStatus').style.color = '#f59e0b';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('startBtn').style.display = 'inline-flex';
    fillerCount = showFillerCount(finalText);
    getAIFeedback(finalText);
  };
</script>

<script type="module" src="login-widget.js"></script>
</body>
</html>
